<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check Student Details</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            padding-bottom: 60px; /* Space for footer */
        }

        .form-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            text-align: center;
            width: 100%;
            max-width: 500px;
            transition: transform 0.3s ease-in-out;
        }

        .form-container:hover {
            transform: scale(1.03);
        }

        h2 {
            color: #fff;
            font-size: 28px;
            margin-bottom: 20px;
            font-weight: 600;
        }

        label {
            color: rgba(255, 255, 255, 0.9);
            font-size: 16px;
            font-weight: bold;
            display: block;
            margin: 10px 0 5px;
            text-align: left;
        }

        select {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: none;
            outline: none;
            font-size: 16px;
            background: rgba(255, 255, 255, 0.9);
            margin-bottom: 15px;
        }

        /* Button container for horizontal layout */
        .buttons-container {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.3s ease-in-out;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .submit-button {
            background: linear-gradient(135deg, #ff4500, #ff6347);
            color: white;
        }

        .home-button {
            background: linear-gradient(135deg, #007bff, #00aaff);
            color: white;
        }

        .back-button {
            background: linear-gradient(135deg, #ffcc00, #ffaa00);
            color: white;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.4);
        }

        /* Footer Styling */
        .footer {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: rgba(0, 0, 0, 0.5);
            text-align: center;
            padding: 15px;
            color: white;
            font-size: 16px;
            font-weight: bold;
        }

        /* Responsive Fix */
        @media (max-width: 500px) {
            .buttons-container {
                flex-direction: column;
            }

            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <div class="form-container">
        <h2>Check Student Details</h2>
        <form id="student-form" action="{{ url_for('view_students') }}" method="POST">
            <label for="department">Select Department:</label>
            <select id="department" name="department" required>
                <option value="tamil">Tamil</option>
                <option value="english">English</option>
                <option value="maths">Maths</option>
                <option value="phy">Physics</option>
                <option value="bio_tech">Bio-Tech</option>
                <option value="it">IT</option>
                <option value="cs">CS</option>
                <option value="b_com">B.Com</option>
                <option value="history">History</option>
            </select>
        
            <label for="year">Select Year:</label>
            <select id="year" name="year" required>
                <option value="1">1st Year</option>
                <option value="2">2nd Year</option>
                <option value="3">3rd Year</option>
            </select>

            <!-- Buttons Section -->
            <div class="buttons-container">
                <button type="submit" class="submit-button">✔ Check Details</button>
                <a href="/" style="text-decoration: none;">
                    <button type="button" class="home-button">🏠 Logout</button>
                </a>
                <button type="button" class="back-button" onclick="history.back()">⬅ Back</button>
            </div>
        </form>
    </div>

    <!-- Footer -->
    <div class="footer">
        <p>&copy; 2025 Your college | All Rights Reserved | Empowering Future Leaders</p>
    </div>

</body>
</html>
